name: Sync Upstream to Master

on:
  schedule:
    - cron: '0 0 * * *' # 每天同步一次
  workflow_dispatch:   # 允许手动触发

jobs:
  sync_to_master:
    runs-on: ubuntu-latest
    steps:
      - name: Sync GitLab to GitHub Master
        run: |
          # 1. 以裸仓库模式克隆上游
          git clone --mirror https://gitlab.com/openconnect/ocserv.git ocserv_mirror
          cd ocserv_mirror
          
          # 2. 设置目标仓库地址（使用你配置好的 Secret）
          git remote set-url --push origin https://${{ github.actor }}:${{ secrets.SYNC_PAT }}@github.com/${{ github.repository }}.git
          
          # 3. 核心步骤：显式推送
          # 格式为 <本地分支>:<远程分支>
          # 这会将上游的 master 推送到 GitHub 的 master，完全不影响 main
          git push origin master:master --force
          
          # 4. 同步所有版本标签（VPN 开发必备）
          git push origin --tags --force
