name: Sync Upstream Mirror

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 0 点自动执行
  workflow_dispatch:   # 允许手动点击运行

jobs:
  mirror_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync GitLab to GitHub
        run: |
          git clone --mirror https://gitlab.com/openconnect/ocserv.git ocserv_mirror
          cd ocserv_mirror
          
          # 移除对 github.repository 的直接依赖，确保 URL 正确
          git remote set-url --push origin https://${{ secrets.SYNC_PAT }}@github.com/${{ github.repository }}.git
          
          # 强制推送所有分支和标签，但不使用 --mirror（避免删除 GitHub 独有的分支）
          git push origin --all --force
          git push origin --tags --force
