name: Sync Upstream to Master

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:   

jobs:
  sync_to_master:
    runs-on: ubuntu-latest
    steps:
      - name: Sync GitLab to GitHub Master
        run: |
          # 1. 正常克隆 GitLab 的 master 分支（不使用 --mirror）
          # --single-branch 确保只拉取 master，提高速度
          git clone --single-branch --branch master https://gitlab.com/openconnect/ocserv.git ocserv_source
          cd ocserv_source
          
          # 2. 设置 GitHub 远程地址（使用你配置好的 SYNC_PAT）
          git remote add github https://${{ github.actor }}:${{ secrets.SYNC_PAT }}@github.com/${{ github.repository }}.git
          
          # 3. 将本地的 master 分支推送到 GitHub 的 master 分支
          # 这样会创建/更新 master，但绝对不会影响你当前的 main 分支
          git push github master --force
          
          # 4. 获取所有标签并同步
          git fetch --tags https://gitlab.com/openconnect/ocserv.git
          git push github --tags --force
