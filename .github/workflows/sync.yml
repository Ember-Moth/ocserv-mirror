name: Global Sync Controller

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:   

jobs:
  sync_to_remote_repo:
    runs-on: ubuntu-latest
    steps:
      - name: Force Sync GitLab to GitHub (Dedicated Repo)
        run: |
          # 1. 克隆上游 GitLab 代码
          git clone --mirror https://gitlab.com/openconnect/ocserv.git upstream_mirror
          cd upstream_mirror
          
          # 2. 推送到目标 GitHub 仓库 (ocserv)
          # 注意：这里的 URL 指向的是你的 ocserv 仓库，而不是当前仓库
          git remote set-url --push origin https://${{ github.actor }}:${{ secrets.SYNC_PAT }}@github.com/${{ github.repository_owner }}/ocserv.git
          
          # 3. 执行镜像推送
          # 既然这是一个独立的仓库，你可以放心地使用 --mirror
          # 这会同步所有分支（master, 0.12.x 等）和所有 Tags
          git push --mirror origin
